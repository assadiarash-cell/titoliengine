name: Accounting Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  accounting-tests:
    name: Accounting & Certification Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite pytest-asyncio httpx bcrypt python-jose cryptography openpyxl

      - name: Run engine tests
        run: pytest tests/engine/ -v --tb=short

      - name: Run E2E certification tests
        run: pytest tests/api/test_e2e_certification.py -v --tb=short
